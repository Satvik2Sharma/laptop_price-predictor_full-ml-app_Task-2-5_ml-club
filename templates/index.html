<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #121212; 
        }
        .card { 
            border-radius: 15px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
            background-color: #1e1e1e;
            border: 1px solid #333;
        }
        .text-primary {
            color: #0d6efd !important;
        }
    </style>
</head>
<body class="text-light">
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4">
                <h2 class="text-center mb-4 text-primary">Laptop Price Predictor</h2>
                
                <form action="/predict" method="POST">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">RAM (GB)</label>
                            <input type="number" class="form-control" name="ram" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Weight (kg)</label>
                            <input type="number" step="0.01" class="form-control" name="weight" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CPU Speed (GHz)</label>
                            <input type="number" step="0.01" class="form-control" name="cpu_speed" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label">Screen Resolution</label>
                            <select class="form-select" name="resolution">
                                <option value="1366x768">1366 x 768 (HD)</option>
                                <option value="1600x900">1600 x 900 (HD+)</option>
                                <option value="1920x1080" selected>1920 x 1080 (Full HD)</option>
                                <option value="2560x1440">2560 x 1440 (2K / QHD)</option>
                                <option value="2560x1600">2560 x 1600 (MacBook Retina)</option>
                                <option value="2880x1800">2880 x 1800 (MacBook Pro)</option>
                                <option value="3840x2160">3840 x 2160 (4K)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Screen Size (Inches)</label>
                            <select class="form-select" name="inches">
                                <option value="11.6">11.6"</option>
                                <option value="12.0">12.0"</option>
                                <option value="13.3">13.3"</option>
                                <option value="13.5">13.5"</option>
                                <option value="14.0">14.0"</option>
                                <option value="15.0">15.0"</option>
                                <option value="15.6" selected>15.6" (Standard)</option>
                                <option value="16.0">16.0"</option>
                                <option value="17.3">17.3"</option>
                                <option value="18.0">18.0"</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">SSD (GB)</label>
                            <input type="number" class="form-control" name="ssd" value="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">HDD (GB)</label>
                            <input type="number" class="form-control" name="hdd" value="0" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Brand</label>
                            <select class="form-select" name="company">
                                <option value="Apple">Apple</option>
                                <option value="Asus">Asus</option>
                                <option value="Dell">Dell</option>
                                <option value="HP">HP</option>
                                <option value="Lenovo">Lenovo</option>
                                <option value="MSI">MSI</option>
                                <option value="Toshiba">Toshiba</option>
                                <option value="Other">Other...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Type Name</label>
                            <select class="form-select" name="typename">
                                <option value="Gaming">Gaming</option>
                                <option value="Notebook">Notebook</option>
                                <option value="Ultrabook">Ultrabook</option>
                                <option value="Workstation">Workstation</option>
                                <option value="Netbook">Netbook</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Operating System</label>
                            <select class="form-select" name="opsys">
                                <option value="Windows">Windows</option>
                                <option value="Mac">Mac</option>
                                <option value="Other">Other/Linux/No OS</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CPU Brand</label>
                            <select class="form-select" name="cpu_brand">
                                <option value="i3">Intel Core i3</option>
                                <option value="i5">Intel Core i5</option>
                                <option value="i7">Intel Core i7</option>
                                <option value="Other Intel">Other Intel</option>
                                <option value="Other">AMD / Other</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">GPU Brand</label>
                            <select class="form-select" name="gpu_brand">
                                <option value="Intel">Intel</option>
                                <option value="Nvidia">Nvidia</option>
                                <option value="ARM">ARM</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Screen Panel Type</label>
                            <select class="form-select" name="screen_type">
                                <option value="Full HD">Full HD</option>
                                <option value="HD">HD</option>
                                <option value="Other">Other / 4K</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Touchscreen</label>
                            <select class="form-select" name="touchscreen">
                                <option value="1">Yes</option>
                                <option value="0" selected>No</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">IPS Display</label>
                            <select class="form-select" name="ips">
                                <option value="1">Yes</option>
                                <option value="0" selected>No</option>
                            </select>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Predict Price</button>
                    </div>
                </form>

                {% if result %}
                <div class="alert alert-success mt-4 text-center fs-4 fw-bold">
                    {{ result }}
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
</body>
</html>
