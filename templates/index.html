<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4">
                <h2 class="text-center mb-4 text-primary">Laptop Price Predictor</h2>
                
                <form action="/predict" method="POST">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">RAM (GB)</label>
                            <input type="number" class="form-control" name="ram" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Weight (kg)</label>
                            <input type="number" step="0.01" class="form-control" name="weight" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CPU Speed (GHz)</label>
                            <input type="number" step="0.01" class="form-control" name="cpu_speed" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Pixels Per Inch (PPI)</label>
                            <input type="number" step="0.1" class="form-control" name="ppi" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">SSD (GB)</label>
                            <input type="number" class="form-control" name="ssd" value="0" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">HDD (GB)</label>
                            <input type="number" class="form-control" name="hdd" value="0" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Brand</label>
                            <select class="form-select" name="company">
                                <option value="Apple">Apple</option>
                                <option value="Asus">Asus</option>
                                <option value="Dell">Dell</option>
                                <option value="HP">HP</option>
                                <option value="Lenovo">Lenovo</option>
                                <option value="MSI">MSI</option>
                                <option value="Toshiba">Toshiba</option>
                                <option value="Other">Other...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Type Name</label>
                            <select class="form-select" name="typename">
                                <option value="Gaming">Gaming</option>
                                <option value="Notebook">Notebook</option>
                                <option value="Ultrabook">Ultrabook</option>
                                <option value="Workstation">Workstation</option>
                                <option value="Netbook">Netbook</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Operating System</label>
                            <select class="form-select" name="opsys">
                                <option value="Windows">Windows</option>
                                <option value="Mac">Mac</option>
                                <option value="Other">Other/Linux/No OS</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CPU Brand</label>
                            <select class="form-select" name="cpu_brand">
                                <option value="i3">Intel Core i3</option>
                                <option value="i5">Intel Core i5</option>
                                <option value="i7">Intel Core i7</option>
                                <option value="Other Intel">Other Intel</option>
                                <option value="Other">AMD / Other</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">GPU Brand</label>
                            <select class="form-select" name="gpu_brand">
                                <option value="Intel">Intel</option>
                                <option value="Nvidia">Nvidia</option>
                                <option value="ARM">ARM</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label">Screen Type</label>
                            <select class="form-select" name="screen_type">
                                <option value="Full HD">Full HD</option>
                                <option value="HD">HD</option>
                                <option value="Other">Other / 4K</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Touchscreen</label>
                            <select class="form-select" name="touchscreen">
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">IPS Display</label>
                            <select class="form-select" name="ips">
                                <option value="1">Yes</option>
                                <option value="0">No</option>
                            </select>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary btn-lg w-100">Predict Price</button>
                    </div>
                </form>

                {% if result %}
                <div class="alert alert-success mt-4 text-center fs-4">
                    <strong>{{ result }}</strong>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
</body>
</html>
