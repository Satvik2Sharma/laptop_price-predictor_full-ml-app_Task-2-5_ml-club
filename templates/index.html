<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0f0f11; /* Deep modern black */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card { 
            border-radius: 12px; 
            background-color: #1a1a1d; /* Slightly lighter card */
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }
        .text-accent {
            color: #ffc107 !important; /* Bold Yellow */
        }
        .btn-custom {
            background-color: #ffc107;
            color: #000;
            font-weight: bold;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            background-color: #e0a800;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }
        .form-control:focus, .form-select:focus {
            border-color: #ffc107;
            box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25);
        }
        .price-box {
            background-color: #242428;
            border-left: 5px solid #ffc107;
            border-radius: 8px;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card p-4 p-md-5">
                <h2 class="text-center mb-1 text-accent fw-bold">Laptop Price Predictor</h2>
                <p class="text-center text-secondary mb-4">AI-Powered Hardware Valuation</p>
                
                <form action="/predict" method="POST">
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label text-light">RAM (GB)</label>
                            <input type="number" class="form-control" name="ram" placeholder="e.g., 8" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-light">Weight (kg)</label>
                            <input type="number" step="0.01" class="form-control" name="weight" placeholder="e.g., 1.5" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-light">CPU Speed (GHz)</label>
                            <input type="number" step="0.01" class="form-control" name="cpu_speed" placeholder="e.g., 2.5" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label text-light">Screen Resolution</label>
                            <select class="form-select" name="resolution">
                                <option value="1366x768">1366 x 768 (HD)</option>
                                <option value="1600x900">1600 x 900 (HD+)</option>
                                <option value="1920x1080" selected>1920 x 1080 (Full HD)</option>
                                <option value="2560x1440">2560 x 1440 (2K / QHD)</option>
                                <option value="2560x1600">2560 x 1600 (MacBook Retina)</option>
                                <option value="2880x1800">2880 x 1800 (MacBook Pro)</option>
                                <option value="3840x2160">3840 x 2160 (4K)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-light">Screen Size (Inches)</label>
                            <select class="form-select" name="inches">
                                <option value="11.6">11.6"</option>
                                <option value="12.0">12.0"</option>
                                <option value="13.3">13.3"</option>
                                <option value="13.5">13.5"</option>
                                <option value="14.0">14.0"</option>
                                <option value="15.0">15.0"</option>
                                <option value="15.6" selected>15.6" (Standard)</option>
                                <option value="16.0">16.0"</option>
                                <option value="17.3">17.3"</option>
                                <option value="18.0">18.0"</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-light">SSD Storage (GB)</label>
                            <input type="number" class="form-control" name="ssd" value="0" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-light">HDD Storage (GB)</label>
                            <input type="number" class="form-control" name="hdd" value="0" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-light">Brand</label>
                            <select class="form-select" name="company">
                                <option value="Apple">Apple</option>
                                <option value="Asus">Asus</option>
                                <option value="Dell">Dell</option>
                                <option value="HP">HP</option>
                                <option value="Lenovo">Lenovo</option>
                                <option value="MSI">MSI</option>
                                <option value="Toshiba">Toshiba</option>
                                <option value="Other">Other...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-light">Laptop Type</label>
                            <select class="form-select" name="typename">
                                <option value="Gaming">Gaming</option>
                                <option value="Notebook">Notebook</option>
                                <option value="Ultrabook">Ultrabook</option>
                                <option value="Workstation">Workstation</option>
                                <option value="Netbook">Netbook</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-light">Operating System</label>
                            <select class="form-select" name="opsys">
                                <option value="Windows">Windows</option>
                                <option value="Mac">Mac</option>
                                <option value="Other">Other / Linux / No OS</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-light">CPU Brand</label>
                            <select class="form-select" name="cpu_brand">
                                <option value="i3">Intel Core i3</option>
                                <option value="i5">Intel Core i5</option>
                                <option value="i7">Intel Core i7</option>
                                <option value="Other Intel">Other Intel</option>
                                <option value="Other">AMD / Other</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-light">GPU Brand</label>
                            <select class="form-select" name="gpu_brand">
                                <option value="Intel">Intel</option>
                                <option value="Nvidia">Nvidia</option>
                                <option value="ARM">ARM</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label text-light">Screen Panel</label>
                            <select class="form-select" name="screen_type">
                                <option value="Full HD">Full HD</option>
                                <option value="HD">HD</option>
                                <option value="Other">Other / 4K</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-light">Touchscreen</label>
                            <select class="form-select" name="touchscreen">
                                <option value="1">Yes</option>
                                <option value="0" selected>No</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-light">IPS Display</label>
                            <select class="form-select" name="ips">
                                <option value="1">Yes</option>
                                <option value="0" selected>No</option>
                            </select>
                        </div>
                    </div>

                    <div class="text-center mt-5">
                        <button type="submit" class="btn btn-custom btn-lg w-100 py-3">⚡ Calculate Estimated Value</button>
                    </div>
                </form>

                {% if eur %}
                <div class="price-box mt-5 text-center shadow-lg">
                    <h5 class="text-secondary mb-3 text-uppercase tracking-wide">Estimated Market Value</h5>
                    <div class="row">
                        <div class="col-4 border-end border-secondary">
                            <h3 class="text-light mb-0">€ {{ eur }}</h3>
                            <small class="text-muted">EUR</small>
                        </div>
                        <div class="col-4 border-end border-secondary">
                            <h3 class="text-accent mb-0">$ {{ usd }}</h3>
                            <small class="text-muted">USD</small>
                        </div>
                        <div class="col-4">
                            <h3 class="text-light mb-0">₹ {{ inr }}</h3>
                            <small class="text-muted">INR</small>
                        </div>
                    </div>
                </div>
                {% endif %}

                {% if error %}
                <div class="alert alert-danger mt-4 text-center fw-bold">
                    {{ error }}
                </div>
                {% endif %}
                
            </div>
        </div>
    </div>
</div>
</body>
</html>
